<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁巢重炮射表计算器</title>
    <style>
        /* ==================== 样式变量 ==================== */
        :root {
            --bg-color: #f4f7f6;           /* 页面背景色 */
            --card-bg: #ffffff;            /* 卡片背景色 */
            --primary-color: #2c3e50;      /* 主要颜色（深蓝灰） */
            --accent-color: #d35400;       /* 强调色（橙色） */
            --text-color: #333333;         /* 文字颜色 */
            --border-color: #e0e0e0;      /* 边框颜色 */
            --header-bg: #edf2f7;          /* 标题栏背景色 */
        }

        /* ==================== 基础样式 ==================== */
        * {
            box-sizing: border-box;         /* 盒模型 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* ==================== 主容器 ==================== */
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--primary-color);
            font-size: 24px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        /* ==================== 工具栏 ==================== */
        .toolbar {
            display: flex;
            justify-content: space-between; /* 左右分布 */
            align-items: center;
            margin-bottom: 20px;
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #b84700;
        }

        .btn-secondary {
            background-color: var(--header-bg);
            color: var(--primary-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #dde4eb;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        /* ==================== 弹道列表 ==================== */
        .trajectory-list {
            display: flex;
            flex-direction: column;     /* 垂直排列 */
            gap: 12px;
        }

        /* ==================== 弹道卡片 ==================== */
        .trajectory-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        /* 卡片标题栏 */
        .trajectory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--header-bg);
            cursor: pointer;
            user-select: none;         /* 禁止选择文字 */
        }

        .trajectory-header:hover {
            background-color: #e4eaf0;
        }

        /* 标题文字 */
        .trajectory-title {
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 展开/收起箭头 */
        .trajectory-title .arrow {
            transition: transform 0.3s;  /* 旋转动画 */
        }

        /* 展开状态箭头旋转 */
        .trajectory-card.expanded .trajectory-title .arrow {
            transform: rotate(90deg);
        }

        /* 收起状态的信息标签样式 */
        .trajectory-card:not(.expanded) .trajectory-title {
            gap: 6px;
        }

        .trajectory-card:not(.expanded) .trajectory-title .info-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        /* 收起状态的距离标签 - 橙色 */
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-distance {
            background-color: var(--accent-color);
            color: white;
        }

        /* 收起状态的仰角标签 - 深色 */
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-angle {
            background-color: var(--primary-color);
            color: white;
        }

        /* 收起状态的装药标签 - 绿色 */
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-charge {
            background-color: #27ae60;
            color: white;
        }

        /* 卡片操作按钮区 */
        .trajectory-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 卡片内容区（可折叠） */
        .trajectory-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;  /* 折叠动画 */
        }

        /* 展开状态 */
        .trajectory-card.expanded .trajectory-content {
            max-height: 500px;
        }

        .trajectory-body {
            padding: 16px;
        }

        /* ==================== 表单样式 ==================== */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            background-color: #fafafa;
            transition: all 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            outline: none;
            background-color: #fff;
        }

        /* ==================== 装药单选按钮组 ==================== */
        .radio-group {
            display: grid;
            grid-template-columns: repeat(6, 1fr);  /* 6列网格 */
            gap: 6px;
        }

        .radio-btn {
            position: relative;
        }

        .radio-btn input {
            position: absolute;
            opacity: 0;              /* 隐藏原生单选框 */
            width: 0;
            height: 0;
        }

        .radio-label {
            display: block;
            text-align: center;
            padding: 8px 4px;
            background-color: #f0f0f0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        /* 选中状态 */
        .radio-btn input:checked + .radio-label {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            font-weight: bold;
        }

        /* 禁用状态 */
        .radio-btn input:disabled + .radio-label {
            background-color: #e0e0e0;
            color: #999;
            border-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .radio-btn input:disabled {
            cursor: not-allowed;
        }

        /* 强制装药6复选框 */
        .checkbox-force-charge6 {
            margin-right: 6px;
            transform: scale(1.1);
        }

        /* ==================== 结果显示区 ==================== */
        .result-box {
            padding: 16px;
            background-color: #edf2f7;
            border-left: 4px solid var(--primary-color);
            border-radius: 0 6px 6px 0;
        }

        .result-label {
            font-size: 12px;
            color: #4a5568;
            text-transform: uppercase;   /* 大写字母 */
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .result-tip {
            font-size: 11px;
            color: #718096;
            margin-top: 4px;
        }

        /* ==================== 历史记录侧边栏 ==================== */

        /* 遮罩层 */
        .history-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 100;
        }

        .history-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /* 侧边栏 */
        .history-sidebar {
            position: fixed;
            top: 0;
            right: -320px;           /* 初始隐藏在右侧 */
            width: 320px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            transition: right 0.3s ease;
            z-index: 101;
            display: flex;
            flex-direction: column;
        }

        .history-sidebar.show {
            right: 0;                 /* 显示侧边栏 */
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-header h3 {
            margin: 0;
            color: var(--primary-color);
        }

        .history-body {
            flex: 1;
            overflow-y: auto;        /* 内容区可滚动 */
            padding: 12px;
        }

        .history-empty {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .history-item {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background-color: var(--header-bg);
            border-color: var(--accent-color);
        }

        .history-item-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .history-item-meta {
            font-size: 11px;
            color: #999;
        }

        .history-item-angle {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .history-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .history-footer .btn {
            flex: 1;
        }

        /* ==================== 空状态 ==================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin: 0 0 16px 0;
        }

        /* ==================== 底部提示 ==================== */
        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 20px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>铁巢重炮射表计算器</h2>

    <!-- 工具栏：新建按钮和历史记录按钮 -->
    <div class="toolbar">
        <button class="btn btn-primary" id="btn-new">+ 新建弹道</button>
        <button class="btn btn-secondary" id="btn-history">📜 历史记录</button>
    </div>

    <!-- 弹道列表容器 -->
    <div class="trajectory-list" id="trajectory-list">
        <!-- 动态生成弹道卡片 -->
    </div>

    <!-- 底部提示 -->
    <div class="hint">
        * 输入距离后自动限制最小装药量，仰角最大60°
    </div>
</div>

<!-- 历史记录侧边栏 -->
<div class="history-overlay" id="history-overlay"></div>
<div class="history-sidebar" id="history-sidebar">
    <div class="history-header">
        <h3>📜 历史记录</h3>
        <button class="btn btn-danger" id="btn-close-history">×</button>
    </div>
    <div class="history-body" id="history-list">
        <!-- 动态生成历史记录 -->
    </div>
    <div class="history-footer">
        <button class="btn btn-secondary" id="btn-clear-history">清空全部</button>
    </div>
</div>

<script>
/* ==================== 配置 ==================== */
// 装药配置表：每种装药的倍数和距离限制
// factor: 每公里需要的仰角度数
// max: 根据60度上限计算的最大可用距离
const config = {
    1: { factor: 12.0, min: 0, max: 5 },    // 装药1: 5km内
    2: { factor: 6.0, min: 5, max: 10 },    // 装药2: 10km内
    3: { factor: 4.0, min: 10, max: 15 },   // 装药3: 15km内
    4: { factor: 3.0, min: 15, max: 20 },   // 装药4: 20km内
    5: { factor: 2.4, min: 20, max: 25 },    // 装药5: 25km内
    6: { factor: 2.0, min: 25, max: 100 }   // 装药6: 100km内
};

// localStorage 存储键名
const STORAGE_KEY = 'trajectory_history';

// 弹道计数器（用于生成唯一ID）
let trajectoryCounter = 0;

/* ==================== 状态管理 ==================== */
// 当前页面所有弹道
let trajectories = [];

// 历史记录数组
let history = [];

/* ==================== DOM 元素引用 ==================== */
const trajectoryList = document.getElementById('trajectory-list');  // 弹道列表容器
const btnNew = document.getElementById('btn-new');                // 新建按钮
const btnHistory = document.getElementById('btn-history');         // 历史记录按钮
const historyOverlay = document.getElementById('history-overlay'); // 遮罩层
const historySidebar = document.getElementById('history-sidebar'); // 侧边栏
const historyList = document.getElementById('history-list');      // 历史列表容器
const btnCloseHistory = document.getElementById('btn-close-history'); // 关闭按钮
const btnClearHistory = document.getElementById('btn-clear-history'); // 清空按钮

/* ==================== 工具函数 ==================== */

/**
 * 生成唯一ID
 * 使用时间戳 + 随机字符串确保唯一性
 */
function generateId() {
    return Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

/**
 * 格式化时间戳为 MM/DD HH:mm 格式
 * @param {number} timestamp - 时间戳
 * @returns {string} 格式化后的时间字符串
 */
function formatTime(timestamp) {
    const d = new Date(timestamp);
    const month = (d.getMonth() + 1).toString().padStart(2, '0');
    const day = d.getDate().toString().padStart(2, '0');
    const hour = d.getHours().toString().padStart(2, '0');
    const min = d.getMinutes().toString().padStart(2, '0');
    return `${month}/${day} ${hour}:${min}`;
}

/* ==================== 仰角限制常量 ==================== */
// 最大仰角限制为60度
const MAX_ANGLE = 60;

/**
 * 根据60度限制计算指定装药的最大可用距离
 * @param {number} charge - 装药等级(1-6)
 * @returns {number} 最大可用距离(公里)
 */
function calcMaxDist(charge) {
    return MAX_ANGLE / config[charge].factor;
}

// 根据60度限制更新各装药的最大距离
config[1].max = calcMaxDist(1);  // 5km
config[2].max = calcMaxDist(2);  // 10km
config[3].max = calcMaxDist(3);  // 15km
config[4].max = calcMaxDist(4);  // 20km
config[5].max = calcMaxDist(5);  // 25km
config[6].max = 100;             // 装药6最远100km

/**
 * 计算仰角
 * @param {number} distance - 目标距离(公里)
 * @param {number} charge - 装药等级
 * @returns {number} 计算得出的仰角(度)，不超过60度
 */
function calculateAngle(distance, charge) {
    const factor = config[charge].factor;
    const rawAngle = distance * factor;
    return Math.min(rawAngle, MAX_ANGLE);  // 限制最大60度
}

/**
 * 获取推荐装药等级
 * 根据60度限制，返回指定距离所需的最小装药
 * @param {number} distance - 目标距离(公里)
 * @returns {number} 推荐装药等级(1-6)
 */
function getRecommendedCharge(distance) {
    if (distance <= 0) return 1;
    for (let i = 1; i <= 6; i++) {
        if (distance <= config[i].max) {
            return i;
        }
    }
    return 6;
}

/* ==================== 历史记录存储 ==================== */

/**
 * 从 localStorage 加载历史记录
 */
function loadHistory() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        history = data ? JSON.parse(data) : [];
    } catch (e) {
        history = [];
    }
}

/**
 * 保存历史记录到 localStorage
 */
function saveHistory() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch (e) {
        console.warn('无法保存历史记录:', e);
    }
}

/**
 * 添加弹道到历史记录
 * @param {Object} trajectory - 弹道对象
 */
function addToHistory(trajectory) {
    const record = {
        id: trajectory.id,
        distance: trajectory.distance,
        charge: trajectory.charge,
        angle: trajectory.angle,
        createdAt: trajectory.createdAt
    };
    history.unshift(record);  // 添加到数组开头
    // 最多保留50条记录
    if (history.length > 50) {
        history = history.slice(0, 50);
    }
    saveHistory();
}

/* ==================== 弹道渲染 ==================== */

/**
 * 渲染单个弹道卡片
 * @param {Object} trajectory - 弹道数据对象
 * @param {number} index - 弹道序号
 * @returns {HTMLElement} 弹道卡片元素
 */
function renderTrajectory(trajectory, index) {
    const card = document.createElement('div');
    // 根据展开状态设置class
    card.className = 'trajectory-card' + (trajectory.expanded ? ' expanded' : '');
    card.dataset.id = trajectory.id;

    // 生成提示文字
    const tipText = getTipText(trajectory.distance, trajectory.charge, trajectory.angle, trajectory.forceCharge6);

    /**
     * 获取提示文字
     * 根据不同情况显示不同的提示信息
     */
    function getTipText(dist, ch, ang, force6) {
        if (force6) {
            return `强制使用装药6计算，仰角${ang.toFixed(2)}°`;
        }
        if (dist > 30) {
            return `超过30km自动使用装药6，仰角上限60°`;
        }
        if (ch !== getRecommendedCharge(dist)) {
            return `提示：当前距离通常推荐使用 [装药 ${getRecommendedCharge(dist)}]`;
        }
        return `使用装药 ${ch}，倍率: ${config[ch].factor.toFixed(1)}°/Km`;
    }

    // 生成卡片HTML
    card.innerHTML = `
        <!-- 卡片标题栏（可点击展开/收起） -->
        <div class="trajectory-header">
            <div class="trajectory-title">
                <span class="arrow">▶</span>
                <span>弹道 #${index + 1}</span>
                <!-- 收起状态显示的信息标签 -->
                <span class="info-tag info-tag-distance">${trajectory.distance} km</span>
                <span class="info-tag info-tag-angle">${trajectory.angle.toFixed(2)}°</span>
                <span class="info-tag info-tag-charge">装药${trajectory.charge}</span>
            </div>
            <div class="trajectory-actions">
                <button class="btn btn-danger btn-delete" data-id="${trajectory.id}">×</button>
            </div>
        </div>

        <!-- 卡片内容区（可折叠） -->
        <div class="trajectory-content">
            <div class="trajectory-body">
                <!-- 距离输入 -->
                <div class="form-group">
                    <label>输入目标距离 (KM):</label>
                    <input type="number" class="input-distance" value="${trajectory.distance || ''}"
                           placeholder="例如: 12.5" step="0.01" min="0" max="100" data-id="${trajectory.id}">
                </div>

                <!-- 强制装药6选项 -->
                <div class="form-group">
                    <label>
                        <input type="checkbox" class="checkbox-force-charge6" data-id="${trajectory.id}" ${trajectory.forceCharge6 ? 'checked' : ''}>
                        强制使用装药6计算（忽略最小装药限制）
                    </label>
                </div>

                <!-- 装药选择 -->
                <div class="form-group">
                    <label>选择药包数量 (装药):</label>
                    <div class="radio-group">
                        ${[1,2,3,4,5,6].map(i => `
                            <div class="radio-btn">
                                <input type="radio" id="zy${i}-${trajectory.id}" name="charge-${trajectory.id}"
                                       value="${i}" ${trajectory.charge == i ? 'checked' : ''}
                                       ${trajectory.distance > config[i].max && !trajectory.forceCharge6 ? 'disabled' : ''}
                                       data-id="${trajectory.id}">
                                <label for="zy${i}-${trajectory.id}" class="radio-label">
                                    ${i}<br><small>${config[i].max}km内</small>
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- 结果显示 -->
                <div class="result-box">
                    <div class="result-label">计算得出仰角</div>
                    <div class="result-value">${trajectory.angle.toFixed(2)}°</div>
                    <div class="result-tip">${tipText}</div>
                </div>
            </div>
        </div>
    `;
    return card;
}

/**
 * 渲染所有弹道卡片
 */
function renderAllTrajectories() {
    trajectoryList.innerHTML = '';

    // 无弹道时显示空状态
    if (trajectories.length === 0) {
        trajectoryList.innerHTML = `
            <div class="empty-state">
                <p>暂无弹道记录</p>
                <button class="btn btn-primary" onclick="createTrajectory()">+ 新建弹道</button>
            </div>
        `;
        return;
    }

    // 渲染每个弹道卡片
    trajectories.forEach((t, i) => {
        trajectoryList.appendChild(renderTrajectory(t, i));
    });
}

/**
 * 更新指定弹道的UI显示
 * @param {string} id - 弹道ID
 */
function updateTrajectoryUI(id) {
    const trajectory = trajectories.find(t => t.id === id);
    if (!trajectory) return;

    const index = trajectories.findIndex(t => t.id === id);
    const card = document.querySelector(`.trajectory-card[data-id="${id}"]`);
    if (!card) return;

    // 更新标题栏信息标签
    const titleSpan = card.querySelector('.trajectory-title');
    titleSpan.innerHTML = `
        <span class="arrow">▶</span>
        <span>弹道 #${index + 1}</span>
        <span class="info-tag info-tag-distance">${trajectory.distance} km</span>
        <span class="info-tag info-tag-angle">${trajectory.angle.toFixed(2)}°</span>
        <span class="info-tag info-tag-charge">装药${trajectory.charge}</span>
    `;

    // 更新结果区
    const resultValue = card.querySelector('.result-value');
    const resultTip = card.querySelector('.result-tip');
    resultValue.textContent = trajectory.angle.toFixed(2) + '°';

    // 生成新的提示文字
    const tipText = (() => {
        if (trajectory.forceCharge6) {
            return `强制使用装药6计算，仰角${trajectory.angle.toFixed(2)}°`;
        }
        if (trajectory.distance > 30) {
            return `超过30km自动使用装药6，仰角上限60°`;
        }
        if (trajectory.charge !== getRecommendedCharge(trajectory.distance)) {
            return `提示：当前距离通常推荐使用 [装药 ${getRecommendedCharge(trajectory.distance)}]`;
        }
        return `使用装药 ${trajectory.charge}，倍率: ${config[trajectory.charge].factor.toFixed(1)}°/Km`;
    })();
    resultTip.textContent = tipText;
}

/* ==================== 弹道操作 ==================== */

/**
 * 创建新弹道
 * @param {Object|null} initialData - 初始数据（可选，用于从历史恢复）
 * @returns {Object} 创建的弹道对象
 */
function createTrajectory(initialData = null) {
    const id = generateId();
    const trajectory = {
        id,
        distance: initialData?.distance || 0,
        charge: initialData?.charge || 1,
        angle: initialData?.angle || 0,
        forceCharge6: initialData?.forceCharge6 || false,
        expanded: true,  // 新建弹道默认展开
        createdAt: initialData?.createdAt || Date.now()
    };
    trajectories.push(trajectory);
    renderAllTrajectories();
    attachTrajectoryEvents();

    // 如果有初始数据（从历史恢复），添加到历史
    if (initialData && initialData.distance > 0) {
        addToHistory(trajectory);
        renderHistoryList();
    }

    return trajectory;
}

/**
 * 删除弹道
 * @param {string} id - 弹道ID
 */
function deleteTrajectory(id) {
    trajectories = trajectories.filter(t => t.id !== id);
    renderAllTrajectories();
    attachTrajectoryEvents();
}

/**
 * 重新计算指定弹道的仰角并更新UI
 * @param {string} id - 弹道ID
 * @param {number} distance - 目标距离
 * @param {number} charge - 装药等级
 */
function recalculate(id, distance, charge) {
    const trajectory = trajectories.find(t => t.id === id);
    if (!trajectory) return;

    trajectory.distance = distance;
    // 如果强制使用装药6，则使用装药6计算
    const actualCharge = trajectory.forceCharge6 ? 6 : charge;
    trajectory.charge = actualCharge;
    trajectory.angle = calculateAngle(distance, actualCharge);

    updateTrajectoryUI(id);

    // 如果是有效计算（距离>0），添加到历史
    if (distance > 0) {
        addToHistory(trajectory);
        renderHistoryList();
    }
}

/**
 * 更新装药选项的禁用状态
 * 根据距离和强制装药6选项，决定哪些装药可选
 * @param {string} id - 弹道ID
 * @param {number} distance - 目标距离
 */
function updateChargeDisabled(id, distance) {
    const trajectory = trajectories.find(t => t.id === id);
    const force6 = trajectory?.forceCharge6 || false;

    for (let i = 1; i <= 6; i++) {
        const radio = document.getElementById(`zy${i}-${id}`);
        if (radio) {
            // 如果强制使用装药6，则不禁用任何选项；否则按正常规则禁用
            radio.disabled = !force6 && distance > config[i].max;
        }
    }
}

/**
 * 自动选中推荐装药
 * @param {number} distance - 目标距离
 * @param {string} id - 弹道ID
 */
function autoSelectCharge(distance, id) {
    if (distance <= 0) return;
    const recommended = getRecommendedCharge(distance);
    const radio = document.getElementById(`zy${recommended}-${id}`);
    if (radio) {
        radio.checked = true;
    }
}

/* ==================== 事件绑定 ==================== */

/**
 * 绑定所有弹道相关事件
 */
function attachTrajectoryEvents() {
    // 展开/收起事件
    document.querySelectorAll('.trajectory-header').forEach(header => {
        header.onclick = (e) => {
            // 点击删除按钮时不触发展开/收起
            if (e.target.closest('.btn-delete')) return;

            const card = header.closest('.trajectory-card');
            const id = card.dataset.id;
            const trajectory = trajectories.find(t => t.id === id);

            if (trajectory) {
                trajectory.expanded = !trajectory.expanded;
                card.classList.toggle('expanded');
            }
        };
    });

    // 删除按钮事件
    document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();  // 阻止冒泡，避免触发收起事件
            const id = btn.dataset.id;
            if (confirm('确定要删除这条弹道吗？')) {
                deleteTrajectory(id);
            }
        };
    });

    // 距离输入事件
    document.querySelectorAll('.input-distance').forEach(input => {
        // 输入时实时计算
        input.oninput = (e) => {
            const id = input.dataset.id;
            const distance = parseFloat(e.target.value) || 0;
            updateChargeDisabled(id, distance);
            autoSelectCharge(distance, id);
            recalculate(id, distance, getSelectedCharge(id));
        };

        // 按回车键收起标签
        input.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const id = input.dataset.id;
                const trajectory = trajectories.find(t => t.id === id);
                const card = document.querySelector(`.trajectory-card[data-id="${id}"]`);
                if (trajectory && card && trajectory.expanded) {
                    trajectory.expanded = false;
                    card.classList.remove('expanded');
                }
                input.blur();  // 移除焦点
            }
        };
    });

    // 装药选择事件
    document.querySelectorAll('input[name^="charge-"]').forEach(radio => {
        radio.onchange = (e) => {
            const id = radio.dataset.id;
            const distance = parseFloat(document.querySelector(`.input-distance[data-id="${id}"]`)?.value) || 0;
            recalculate(id, distance, parseInt(e.target.value));
        };
    });

    // 强制装药6复选框事件
    document.querySelectorAll('.checkbox-force-charge6').forEach(checkbox => {
        checkbox.onchange = (e) => {
            const id = checkbox.dataset.id;
            const trajectory = trajectories.find(t => t.id === id);
            if (trajectory) {
                trajectory.forceCharge6 = e.target.checked;
                updateChargeDisabled(id, trajectory.distance);
                const distance = parseFloat(document.querySelector(`.input-distance[data-id="${id}"]`)?.value) || 0;
                recalculate(id, distance, getSelectedCharge(id));
            }
        };
    });
}

/**
 * 获取指定弹道当前选中的装药
 * @param {string} id - 弹道ID
 * @returns {number} 选中的装药等级
 */
function getSelectedCharge(id) {
    const radio = document.querySelector(`input[name="charge-${id}"]:checked`);
    return radio ? parseInt(radio.value) : 1;
}

/* ==================== 历史记录 ==================== */

/**
 * 渲染历史记录列表
 */
function renderHistoryList() {
    if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
        return;
    }

    historyList.innerHTML = history.map((h, i) => `
        <div class="history-item" data-index="${i}">
            <div class="history-item-title">弹道 #${i + 1}</div>
            <div>距离: ${h.distance} km | 装药: ${h.charge}</div>
            <div class="history-item-angle">${h.angle.toFixed(2)}°</div>
            <div class="history-item-meta">${formatTime(h.createdAt)}</div>
        </div>
    `).join('');

    // 点击历史记录恢复到新弹道
    historyList.querySelectorAll('.history-item').forEach(item => {
        item.onclick = () => {
            const index = parseInt(item.dataset.index);
            const record = history[index];
            createTrajectory({
                distance: record.distance,
                charge: record.charge,
                angle: record.angle,
                createdAt: Date.now()
            });
            closeHistory();
        };
    });
}

/**
 * 打开历史记录侧边栏
 */
function openHistory() {
    renderHistoryList();
    historyOverlay.classList.add('show');
    historySidebar.classList.add('show');
}

/**
 * 关闭历史记录侧边栏
 */
function closeHistory() {
    historyOverlay.classList.remove('show');
    historySidebar.classList.remove('show');
}

/**
 * 清空所有历史记录
 */
function clearAllHistory() {
    if (confirm('确定要清空所有历史记录吗？')) {
        history = [];
        saveHistory();
        renderHistoryList();
    }
}

/* ==================== 初始化 ==================== */

/**
 * 初始化应用
 */
function init() {
    loadHistory();          // 加载历史记录
    renderAllTrajectories(); // 渲染弹道列表
    attachTrajectoryEvents(); // 绑定事件

    // 如果没有弹道，创建一个空白弹道
    if (trajectories.length === 0) {
        createTrajectory();
    }
}

/* ==================== 全局事件绑定 ==================== */
btnNew.onclick = () => createTrajectory();      // 新建按钮
btnHistory.onclick = openHistory;               // 历史按钮
btnCloseHistory.onclick = closeHistory;         // 关闭按钮
btnClearHistory.onclick = clearAllHistory;      // 清空按钮
historyOverlay.onclick = closeHistory;          // 点击遮罩关闭

// 启动应用
init();
</script>
