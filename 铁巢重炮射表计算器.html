<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁巢重炮射表计算器</title>
    <style>
        /* ==================== 样式变量定义 ==================== */
        :root {
            --bg-color: #f4f7f6; /* 页面背景颜色变量 */
            --card-bg: #ffffff; /* 卡片背景颜色变量 */
            --primary-color: #2c3e50; /* 主要颜色变量（深蓝灰色） */
            --accent-color: #d35400; /* 强调颜色变量（橙色） */
            --text-color: #333333; /* 文字颜色变量 */
            --border-color: #e0e0e0; /* 边框颜色变量 */
            --header-bg: #edf2f7; /* 标题栏背景颜色变量 */
        }
        /* ==================== 基础样式 ==================== */
        * {
            box-sizing: border-box; /* 盒尺寸计算方式为border-box */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; /* 字体栈，兼容各系统 */
            background-color: var(--bg-color); /* 使用变量设置背景色 */
            color: var(--text-color); /* 使用变量设置文字颜色 */
            margin: 0; /* 外边距为0 */
            padding: 20px; /* 内边距20px */
            min-height: 100vh; /* 最小高度100%视口高度 */
        }
        /* ==================== 主容器样式 ==================== */
        .container {
            background-color: var(--card-bg); /* 白色卡片背景 */
            padding: 30px; /* 内边距30px */
            border-radius: 12px; /* 圆角12px */
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); /* 阴影效果 */
            max-width: 600px; /* 最大宽度600px */
            margin: 0 auto; /* 水平居中 */
        }
        h2 {
            text-align: center; /* 文字居中对齐 */
            margin-top: 0; /* 上外边距为0 */
            color: var(--primary-color); /* 标题颜色 */
            font-size: 24px; /* 字号24px */
            border-bottom: 2px solid var(--accent-color); /* 底部橙色边框线 */
            padding-bottom: 10px; /* 底部内边距10px */
        }
        /* ==================== 工具栏样式 ==================== */
        .toolbar {
            display: flex; /* 弹性盒布局 */
            justify-content: space-between; /* 项目之间留有空间 */
            align-items: center; /* 交叉轴居中对齐 */
            margin-bottom: 20px; /* 底部外边距20px */
        }
        /* ==================== 按钮样式 ==================== */
        .btn {
            padding: 10px 16px; /* 内边距上下10px，左右16px */
            border: none; /* 无边框 */
            border-radius: 6px; /* 圆角6px */
            font-size: 14px; /* 字号14px */
            cursor: pointer; /* 鼠标指针为手型 */
            transition: all 0.2s; /* 所有属性的0.2秒过渡效果 */
        }
        .btn-primary {
            background-color: var(--accent-color); /* 橙色背景 */
            color: white; /* 白色文字 */
        }
        .btn-primary:hover {
            background-color: #b84700; /* 深橙色背景 */
        }
        .btn-secondary {
            background-color: var(--header-bg); /* 浅灰背景 */
            color: var(--primary-color); /* 深色文字 */
            border: 1px solid var(--border-color); /* 边框线 */
        }
        .btn-secondary:hover {
            background-color: #dde4eb; /* 更深的灰色背景 */
        }
        .btn-danger {
            background-color: #e74c3c; /* 红色背景 */
            color: white; /* 白色文字 */
            padding: 6px 10px; /* 内边距缩小 */
            font-size: 12px; /* 字号12px */
        }
        .btn-danger:hover {
            background-color: #c0392b; /* 更深的红色背景 */
        }
        /* ==================== 弹道列表样式 ==================== */
        .trajectory-list {
            display: flex; /* 弹性盒布局 */
            flex-direction: column; /* 垂直方向排列 */
            gap: 12px; /* 项目之间12px间距 */
        }
        /* ==================== 弹道卡片样式 ==================== */
        .trajectory-card {
            border: 1px solid var(--border-color); /* 灰色边框线 */
            border-radius: 8px; /* 圆角8px */
            overflow: hidden; /* 隐藏溢出内容 */
        }
        .trajectory-header {
            display: flex; /* 弹性盒布局 */
            justify-content: space-between; /* 两端对齐 */
            align-items: center; /* 垂直居中 */
            padding: 12px 16px; /* 内边距上下12px，左右16px */
            background-color: var(--header-bg); /* 浅灰色背景 */
            cursor: pointer; /* 鼠标指针为手型 */
            user-select: none; /* 禁止用户选择文字 */
        }
        .trajectory-header:hover {
            background-color: #e4eaf0; /* 稍深的灰色背景 */
        }
        .trajectory-title {
            font-weight: bold; /* 粗体 */
            color: var(--primary-color); /* 深色文字 */
            display: flex; /* 弹性盒布局 */
            align-items: center; /* 垂直居中 */
            gap: 8px; /* 项目之间8px间距 */
        }
        .trajectory-title .arrow {
            transition: transform 0.3s; /* 旋转动画0.3秒 */
        }
        .trajectory-card.expanded .trajectory-title .arrow {
            transform: rotate(90deg); /* 顺时针旋转90度 */
        }
        .trajectory-card:not(.expanded) .trajectory-title {
            gap: 6px; /* 标签之间6px间距 */
        }
        .trajectory-card:not(.expanded) .trajectory-title .info-tag {
            display: inline-block; /* 行内块元素 */
            padding: 2px 8px; /* 内边距上下2px，左右8px */
            border-radius: 4px; /* 圆角4px */
            font-size: 12px; /* 字号12px */
            font-weight: bold; /* 粗体 */
        }
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-distance {
            background-color: var(--accent-color); /* 橙色背景 */
            color: white; /* 白色文字 */
        }
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-angle {
            background-color: var(--primary-color); /* 深蓝灰背景 */
            color: white; /* 白色文字 */
        }
        .trajectory-card:not(.expanded) .trajectory-title .info-tag-charge {
            background-color: #27ae60; /* 绿色背景 */
            color: white; /* 白色文字 */
        }
        .trajectory-actions {
            display: flex; /* 弹性盒布局 */
            gap: 8px; /* 按钮之间8px间距 */
            align-items: center; /* 垂直居中 */
        }
        .trajectory-content {
            max-height: 0; /* 初始高度为0，实现折叠效果 */
            overflow: hidden; /* 隐藏溢出内容 */
            transition: max-height 0.3s ease-out; /* 高度变化的动画效果 */
        }
        .trajectory-card.expanded .trajectory-content {
            max-height: 500px; /* 最大高度500px */
        }
        .trajectory-body {
            padding: 16px; /* 内边距16px */
        }
        /* ==================== 表单样式 ==================== */
        .form-group {
            margin-bottom: 16px; /* 底部外边距16px */
        }
        label {
            display: block; /* 块级元素 */
            margin-bottom: 6px; /* 底部外边距6px */
            font-weight: bold; /* 粗体 */
            color: var(--primary-color); /* 深色文字 */
            font-size: 14px; /* 字号14px */
        }
        input[type="number"] {
            width: 100%; /* 宽度100% */
            padding: 10px; /* 内边距10px */
            border: 1px solid var(--border-color); /* 灰色边框 */
            border-radius: 6px; /* 圆角6px */
            font-size: 16px; /* 字号16px */
            background-color: #fafafa; /* 浅灰背景 */
            transition: all 0.3s; /* 所有属性0.3秒过渡 */
        }
        input[type="number"]:focus {
            border-color: var(--accent-color); /* 橙色边框 */
            outline: none; /* 移除默认轮廓 */
            background-color: #fff; /* 白色背景 */
        }
        /* ==================== 装药单选按钮组样式 ==================== */
        .radio-group {
            display: grid; /* 网格布局 */
            grid-template-columns: repeat(6, 1fr); /* 6列等宽网格 */
            gap: 6px; /* 网格项目之间6px间距 */
        }
        .radio-btn {
            position: relative; /* 相对定位，作为内部绝对定位元素的参考 */
        }
        .radio-btn input {
            position: absolute; /* 绝对定位 */
            opacity: 0; /* 完全透明隐藏 */
            width: 0; /* 宽度为0 */
            height: 0; /* 高度为0 */
        }
        .radio-label {
            display: block; /* 块级元素 */
            text-align: center; /* 文字居中 */
            padding: 8px 4px; /* 内边距上下8px，左右4px */
            background-color: #f0f0f0; /* 浅灰背景 */
            border: 1px solid var(--border-color); /* 灰色边框 */
            border-radius: 4px; /* 圆角4px */
            cursor: pointer; /* 手型指针 */
            font-size: 12px; /* 字号12px */
            transition: all 0.2s; /* 所有属性0.2秒过渡 */
        }
        .radio-btn input:checked + .radio-label {
            background-color: var(--accent-color); /* 橙色背景 */
            color: white; /* 白色文字 */
            border-color: var(--accent-color); /* 橙色边框 */
            font-weight: bold; /* 粗体 */
        }
        .radio-btn input:disabled + .radio-label {
            background-color: #e0e0e0; /* 灰色背景 */
            color: #999; /* 灰色文字 */
            border-color: #ccc; /* 浅灰边框 */
            cursor: not-allowed; /* 禁用光标 */
            opacity: 0.6; /* 半透明 */
        }
        .radio-btn input:disabled {
            cursor: not-allowed; /* 禁用光标 */
        }
        .checkbox-force-charge6 {
            margin-right: 6px; /* 右侧外边距6px */
            transform: scale(1.1); /* 放大1.1倍 */
        }
        /* ==================== 结果显示区样式 ==================== */
        .result-box {
            padding: 16px; /* 内边距16px */
            background-color: #edf2f7; /* 浅蓝灰背景 */
            border-left: 4px solid var(--primary-color); /* 左侧深色粗边框 */
            border-radius: 0 6px 6px 0; /* 右侧圆角 */
        }
        .result-label {
            font-size: 12px; /* 字号12px */
            color: #4a5568; /* 深灰色 */
            text-transform: uppercase; /* 文字转为大写 */
            letter-spacing: 1px; /* 字符间距1px */
        }
        .result-value {
            font-size: 28px; /* 字号28px */
            font-weight: bold; /* 粗体 */
            color: var(--accent-color); /* 橙色 */
        }
        .result-tip {
            font-size: 11px; /* 字号11px */
            color: #718096; /* 灰色 */
            margin-top: 4px; /* 上方外边距4px */
        }
        /* ==================== 历史记录侧边栏样式 ==================== */
        .history-overlay {
            position: fixed; /* 固定定位 */
            top: 0; /* 顶部0 */
            left: 0; /* 左侧0 */
            right: 0; /* 右侧0 */
            bottom: 0; /* 底部0 */
            background: rgba(0,0,0,0.4); /* 半透明黑色背景 */
            opacity: 0; /* 完全透明 */
            visibility: hidden; /* 不可见 */
            transition: all 0.3s; /* 所有属性0.3秒过渡 */
            z-index: 100; /* 层叠顺序100 */
        }
        .history-overlay.show {
            opacity: 1; /* 完全不透明 */
            visibility: visible; /* 可见 */
        }
        .history-sidebar {
            position: fixed; /* 固定定位 */
            top: 0; /* 顶部0 */
            right: -320px; /* 初始位置在右侧屏幕外 */
            width: 320px; /* 宽度320px */
            height: 100%; /* 高度100% */
            background: var(--card-bg); /* 白色背景 */
            box-shadow: -4px 0 20px rgba(0,0,0,0.15); /* 左侧阴影效果 */
            transition: right 0.3s ease; /* 右侧位置动画 */
            z-index: 101; /* 层叠顺序101，在遮罩之上 */
            display: flex; /* 弹性盒布局 */
            flex-direction: column; /* 垂直排列 */
        }
        .history-sidebar.show {
            right: 0; /* 右侧位置0，进入视口 */
        }
        .history-header {
            display: flex; /* 弹性盒布局 */
            justify-content: space-between; /* 两端对齐 */
            align-items: center; /* 垂直居中 */
            padding: 16px 20px; /* 内边距 */
            border-bottom: 1px solid var(--border-color); /* 底部边框线 */
        }
        .history-header h3 {
            margin: 0; /* 外边距为0 */
            color: var(--primary-color); /* 深色文字 */
        }
        .history-body {
            flex: 1; /* 占据剩余空间 */
            overflow-y: auto; /* 垂直方向可滚动 */
            padding: 12px; /* 内边距12px */
        }
        .history-empty {
            text-align: center; /* 文字居中 */
            color: #999; /* 灰色文字 */
            padding: 40px 20px; /* 内边距 */
        }
        .history-item {
            padding: 12px; /* 内边距12px */
            border: 1px solid var(--border-color); /* 边框线 */
            border-radius: 6px; /* 圆角6px */
            margin-bottom: 8px; /* 底部外边距8px */
            cursor: pointer; /* 手型指针 */
            transition: all 0.2s; /* 所有属性0.2秒过渡 */
        }
        .history-item:hover {
            background-color: var(--header-bg); /* 浅灰背景 */
            border-color: var(--accent-color); /* 橙色边框 */
        }
        .history-item-title {
            font-weight: bold; /* 粗体 */
            color: var(--primary-color); /* 深色文字 */
            margin-bottom: 4px; /* 底部外边距4px */
        }
        .history-item-meta {
            font-size: 11px; /* 字号11px */
            color: #999; /* 灰色文字 */
        }
        .history-item-angle {
            font-size: 18px; /* 字号18px */
            font-weight: bold; /* 粗体 */
            color: var(--accent-color); /* 橙色 */
        }
        .history-footer {
            padding: 12px; /* 内边距12px */
            border-top: 1px solid var(--border-color); /* 顶部边框线 */
            display: flex; /* 弹性盒布局 */
            gap: 8px; /* 项目之间8px间距 */
        }
        .history-footer .btn {
            flex: 1; /* 按钮等宽 */
        }
        /* ==================== 空状态样式 ==================== */
        .empty-state {
            text-align: center; /* 文字居中 */
            padding: 40px 20px; /* 内边距 */
            color: #999; /* 灰色文字 */
        }
        .empty-state p {
            margin: 0 0 16px 0; /* 底部外边距16px */
        }
        /* ==================== 底部提示样式 ==================== */
        .hint {
            font-size: 12px; /* 字号12px */
            color: #718096; /* 灰色 */
            margin-top: 20px; /* 上方外边距20px */
            text-align: center; /* 居中对齐 */
            line-height: 1.4; /* 行高1.4倍 */
        }
    </style>
</head>
<body>
    <div class="container"> <!-- 主容器开始 -->
        <h2>铁巢重炮射表计算器</h2> <!-- 主标题 -->
        <div class="toolbar"> <!-- 工具栏容器开始 -->
            <button class="btn btn-primary" id="btn-new">+ 新建弹道</button> <!-- 新建弹道按钮 -->
            <button class="btn btn-secondary" id="btn-history">📜 历史记录</button> <!-- 历史记录按钮 -->
        </div> <!-- 工具栏容器结束 -->
        <div class="trajectory-list" id="trajectory-list"> <!-- 弹道列表容器 -->
        </div> <!-- 弹道列表容器结束 -->
        <div class="hint"> <!-- 提示区域开始 -->
            * 输入距离后自动限制最小装药量，仰角最大60°
        </div> <!-- 提示区域结束 -->
    </div> <!-- 主容器结束 -->
    <div class="history-overlay" id="history-overlay"></div> <!-- 遮罩层 -->
    <div class="history-sidebar" id="history-sidebar"> <!-- 侧边栏开始 -->
        <div class="history-header"> <!-- 侧边栏头部开始 -->
            <h3>📜 历史记录</h3> <!-- 侧边栏标题 -->
            <button class="btn btn-danger" id="btn-close-history">×</button> <!-- 关闭按钮 -->
        </div> <!-- 侧边栏头部结束 -->
        <div class="history-body" id="history-list"> <!-- 历史列表容器开始 -->
        </div> <!-- 历史列表容器结束 -->
        <div class="history-footer"> <!-- 侧边栏底部开始 -->
            <button class="btn btn-secondary" id="btn-clear-history">清空全部</button> <!-- 清空按钮 -->
        </div> <!-- 侧边栏底部结束 -->
    </div> <!-- 侧边栏结束 -->
<script>
/* ==================== 配置定义 ==================== */
const config = { /* 装药配置对象 */
    1: { factor: 12.0, min: 0, max: 5 }, /* 装药1: 倍率12.0°/km，最大5km */
    2: { factor: 6.0, min: 5, max: 10 }, /* 装药2: 倍率6.0°/km，最大10km */
    3: { factor: 4.0, min: 10, max: 15 }, /* 装药3: 倍率4.0°/km，最大15km */
    4: { factor: 3.0, min: 15, max: 20 }, /* 装药4: 倍率3.0°/km，最大20km */
    5: { factor: 2.4, min: 20, max: 25 }, /* 装药5: 倍率2.4°/km，最大25km */
    6: { factor: 2.0, min: 25, max: 100 } /* 装药6: 倍率2.0°/km，最大100km */
}; /* 配置对象结束 */
const STORAGE_KEY = 'trajectory_history'; /* 历史记录存储的键名 */
let trajectoryCounter = 0; /* 弹道计数器 */
let trajectories = []; /* 当前页面所有弹道数组 */
let history = []; /* 历史记录数组 */
const trajectoryList = document.getElementById('trajectory-list'); /* 获取弹道列表容器元素 */
const btnNew = document.getElementById('btn-new'); /* 获取新建按钮元素 */
const btnHistory = document.getElementById('btn-history'); /* 获取历史记录按钮元素 */
const historyOverlay = document.getElementById('history-overlay'); /* 获取遮罩层元素 */
const historySidebar = document.getElementById('history-sidebar'); /* 获取侧边栏元素 */
const historyList = document.getElementById('history-list'); /* 获取历史列表容器元素 */
const btnCloseHistory = document.getElementById('btn-close-history'); /* 获取关闭按钮元素 */
const btnClearHistory = document.getElementById('btn-clear-history'); /* 获取清空按钮元素 */
/* ==================== 工具函数 ==================== */
function generateId() { /* generateId函数开始，返回唯一ID */
    return Date.now() + '_' + Math.random().toString(36).substr(2, 9); /* 返回时间戳+随机字符串 */
} /* generateId函数结束 */
function formatTime(timestamp) { /* formatTime函数开始，格式化时间戳 */
    const d = new Date(timestamp); /* 创建Date对象 */
    const month = (d.getMonth() + 1).toString().padStart(2, '0'); /* 获取月份并补零 */
    const day = d.getDate().toString().padStart(2, '0'); /* 获取日期并补零 */
    const hour = d.getHours().toString().padStart(2, '0'); /* 获取小时并补零 */
    const min = d.getMinutes().toString().padStart(2, '0'); /* 获取分钟并补零 */
    return `${month}/${day} ${hour}:${min}`; /* 返回格式化字符串 */
} /* formatTime函数结束 */
/* ==================== 仰角限制常量 ==================== */
const MAX_ANGLE = 60; /* 最大仰角常量，限制为60度 */
function calcMaxDist(charge) { /* calcMaxDist函数开始，计算最大距离 */
    return MAX_ANGLE / config[charge].factor; /* 60度除以倍率得到最大距离 */
} /* calcMaxDist函数结束 */
config[1].max = calcMaxDist(1); /* 装药1最大距离 = 60/12.0 = 5km */
config[2].max = calcMaxDist(2); /* 装药2最大距离 = 60/6.0 = 10km */
config[3].max = calcMaxDist(3); /* 装药3最大距离 = 60/4.0 = 15km */
config[4].max = calcMaxDist(4); /* 装药4最大距离 = 60/3.0 = 20km */
config[5].max = calcMaxDist(5); /* 装药5最大距离 = 60/2.4 = 25km */
config[6].max = 100; /* 装药6最大距离设为100km */
function calculateAngle(distance, charge) { /* calculateAngle函数开始，计算仰角 */
    const factor = config[charge].factor; /* 获取该装药的倍率 */
    const rawAngle = distance * factor; /* 原始计算：距离乘以倍率 */
    return Math.min(rawAngle, MAX_ANGLE); /* 返回不超过60度的值 */
} /* calculateAngle函数结束 */
function getRecommendedCharge(distance) { /* getRecommendedCharge函数开始，获取推荐装药 */
    if (distance <= 0) return 1; /* 距离为0或负数时返回装药1 */
    for (let i = 1; i <= 6; i++) { /* 遍历所有装药等级 */
        if (distance <= config[i].max) { /* 如果距离小于等于该装药的最大距离 */
            return i; /* 返回该装药等级 */
        } /* if结束 */
    } /* 循环结束 */
    return 6; /* 超过所有装药范围时返回装药6 */
} /* getRecommendedCharge函数结束 */
/* ==================== 历史记录存储 ==================== */

btnClearHistory.onclick = clearAllHistory; /* 清空按钮点击事件 */
historyOverlay.onclick = closeHistory; /* 遮罩层点击事件 */
/* 监听DEL键删除当前聚焦的弹道 */
document.addEventListener('keydown', (e) => { /* 键盘事件处理 */
    if (e.key === 'Delete') { /* 如果按下的是DEL键 */
        const focused = document.activeElement; /* 获取当前聚焦的元素 */
        const header = focused.closest('.trajectory-header'); /* 查找最近的标题栏元素 */
        if (header) { /* 如果聚焦元素在标题栏内 */
            const card = header.closest('.trajectory-card'); /* 获取卡片元素 */
            const id = card?.dataset.id; /* 获取弹道ID */
            if (id) { /* 如果ID存在 */
                deleteTrajectory(id); /* 直接删除弹道，无需确认 */
            } /* if结束 */
        } /* if结束 */
    } /* if结束 */
}); /* 键盘事件处理结束 */
init(); /* 调用初始化函数 */
</script>
</body>
</html>
